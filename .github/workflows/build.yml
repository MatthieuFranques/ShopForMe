name: Build

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sonarqube:
    name: SonarQube
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 📌 Checking for Flutter (mobile repository)
      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.1'
          channel: 'stable'

      - name: Get Flutter dependencies
        run: flutter pub get
        working-directory: mobile

      - name: Build Flutter app (Debug)
        run: flutter build apk --debug
        working-directory: mobile
        
      - name: Run Flutter Tests with Coverage
        run: |
          cd mobile
          flutter test --coverage
        continue-on-error: true
          
      - name: Filter Flutter Coverage Report
        run: |
          cd mobile
          lcov --remove coverage/lcov.info '*/test/*' -o coverage/lcov.info

      # 📌 Checking for NodeJS (backend repository)
      - name: Setup Node.js (Backend)
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Backend dependencies
        run: |
          cd backend
          npm install

      - name: Lint Backend code
        run: |
          cd backend
          npx eslint 'src/**/*.ts' --fix
        continue-on-error: true
        
      - name: Run Backend Tests with Coverage
        run: |
          cd backend
          npm run test:coverage-sonar

      # 📌 SonarQube analysis (without tests)
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v4
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            --define sonar.projectKey=shopforme
            --define sonar.organization=shopforme
            --define sonar.sources=mobile/lib,mobile/test,backend/src
            --define sonar.typescript.tsconfigPath=backend/tsconfig.json
            --define sonar.javascript.lcov.reportPaths=backend/coverage/lcov.info
            --define sonar.dart.lcov.reportPaths=mobile/coverage/lcov.info
            --define sonar.c.file.suffixes=-
            --define sonar.cpp.file.suffixes=-
            --define sonar.objc.file.suffixes=-
