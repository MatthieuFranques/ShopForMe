name: Build

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sonarqube:
    name: SonarQube
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 📌 Checking for Flutter (mobile repository)
      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.1'
          channel: 'stable'

      - name: Get Flutter dependencies
        run: flutter pub get
        working-directory: mobile

      - name: Build Flutter app (Debug)
        run: flutter build apk --debug
        working-directory: mobile

      - name: Run Flutter Tests with Coverage
        run: |
          cd mobile
          flutter test --coverage
        continue-on-error: true

      # 📌 Checking for NodeJS (backend repository)
      - name: Setup Node.js (Backend)
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Backend dependencies
        run: |
          cd backend
          npm install

      - name: Lint Backend code
        run: |
          cd backend
          npx eslint 'src/**/*.ts' --fix
        continue-on-error: true

      - name: Run Backend Tests with Coverage
        run: |
          cd backend
          npm run test:coverage-sonar

      # 📌 Checking for NodeJS (frontend repository)
      - name: Setup Node.js (Frontend)
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Frontend dependencies
        run: |
          cd frontend
          npm install

      - name: Lint Frontend code
        run: |
          cd frontend
          npm run lint
        continue-on-error: true

      # 📌 Setup Arduino CLI for IoT code
      - name: Setup Arduino CLI
        uses: arduino/setup-arduino-cli@v2

      - name: Install ESP32 platform
        run: |
          arduino-cli core update-index
          arduino-cli core install esp32:esp32

      - name: Create Arduino libraries directory
        run: mkdir -p ~/Arduino/libraries

      - name: Install required libraries
        run: |
          # Installation des bibliothèques officielles Arduino
          arduino-cli lib install "SPI"
          arduino-cli lib install "Arduino_JSON"
          
          # Installation des bibliothèques BLE pour ESP32 (incluses dans le core ESP32)
          
          # Installation de la bibliothèque DW1000
          git clone https://github.com/thotro/arduino-dw1000.git ~/Arduino/libraries/DW1000
          
          # Installation de la bibliothèque DW1000Ranging
          git clone https://github.com/F-Army/arduino-dw1000-ng.git ~/Arduino/libraries/DW1000Ranging
        continue-on-error: true

      - name: Verify Arduino sketches
        run: |
          cd iot/app
          for d in */main; do
            if [ -f "$d/main.ino" ]; then
              echo "Verifying $d/main.ino"
              arduino-cli compile --fqbn esp32:esp32:esp32 "$d" --verbose
            fi
          done
        continue-on-error: true

      # 📌 SonarQube analysis
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v4
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            --define sonar.projectKey=shopforme
            --define sonar.organization=shopforme
            --define sonar.sources=mobile/lib,mobile/test,backend/src,frontend/src,iot/app
            --define sonar.exclusions=frontend/src/fonts/**,frontend/src/models/**,frontend/src/images/**
            --define sonar.typescript.tsconfigPath=backend/tsconfig.json
            --define sonar.javascript.lcov.reportPaths=backend/coverage/lcov.info
            --define sonar.dart.lcov.reportPaths=mobile/coverage/lcov.info
            --define sonar.coverage.exclusions=mobile/test/**,mobile/lib/blocs/**,mobile/lib/config/**,mobile/lib/ui/**,mobile/lib/utils/**,backend/src/tests/**,backend/src/routes/**,frontend/**,iot/app/**
            --define sonar.cpp.file.suffixes=.cpp,.h,.ino
            --define sonar.c.file.suffixes=.c
            --define sonar.objc.file.suffixes=-
