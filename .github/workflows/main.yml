name: Push on Epitech repository

on:
  push:
    branches:
      - '*'

jobs:
  build:
    if: github.repository == 'FredericLEDOUARIN/Esp-ShopForMe-Local'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
        with:
          fetch-depth: 0
          ssh-key: ${{ secrets.MY_KEY }}

      - name: Push all branches
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Get all branches
          branches=$(git branch -r | grep -v '\->' | sed 's/origin\///')
          
          # Loop through each branch and push it
          for branch in $branches; do
            git checkout "$branch"
            git push --repo="git@github.com:EpitechMscProPromo2025/T-ESP-901-60371-TLS-ShopForMe-2.git" --force
          done
