version: '3.7'

services:
  app:
    build:
      context: backend
      dockerfile: Dockerfile
    volumes:
      - ./backend:/app
      - /src/app/node_modules
    ports:
      - 3000:3000
    environment:
      DATABASE_URL: postgres://postgres:password@db:5432/postgres
      PORT: 3000
    depends_on:
      - db
  db:
    image: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: postgres
    ports:
      - 5432:5432
    volumes:
      - postgres:/var/lib/postgresql/data
  adminer:
    image: adminer
    ports:
      - 8080:8080
    depends_on:
      - db
volumes:
  postgres: