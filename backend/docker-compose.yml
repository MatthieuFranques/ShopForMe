version: '3.7'

services:
  db:
    image: postgres
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - ${DB_PORT}:${DB_PORT}
    volumes:
      - postgres:/var/lib/postgresql/data
  adminer:
    image: adminer
    ports:
      - 8080:8080
  node-application:
    build: .
    container_name: node-application
    ports:
      - ${BACKEND_PORT}:${BACKEND_PORT}
    restart: always
    depends_on:
      - db
    
volumes:
  postgres: