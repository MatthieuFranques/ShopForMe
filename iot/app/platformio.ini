[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

lib_deps =
    https://github.com/thotro/arduino-dw1000.git
    arduino-libraries/ArduinoBLE@1.3.6

build_flags =
    -D SPI_H_INCLUDED
    -D USE_ARDUINO_SPI_LIBRARY
    -I include

platform_packages =
    framework-arduinoespressif32 @ https://github.com/espressif/arduino-esp32.git#2.0.7

compiledb_absolute_paths = true